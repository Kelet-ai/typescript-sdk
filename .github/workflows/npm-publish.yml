name: Publish to NPM

on:
  push:
    paths:
      - 'src/**'
    branches: [master, main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test --run

      - name: Run type checking
        run: bun run typecheck

      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.github_token }}

      - name: Build package
        run: bun run build

      - name: Verify build output
        run: bun run verify-build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Debug OIDC environment
        run: |
          echo "=== node/npm versions ==="
          node --version
          npm --version
          echo "=== OIDC env vars ==="
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN set: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
          echo "GITHUB_WORKFLOW_REF: $GITHUB_WORKFLOW_REF"
          echo "=== existing npmrc files ==="
          ls -la ~/.npmrc 2>/dev/null || echo "no ~/.npmrc"
          ls -la ./.npmrc 2>/dev/null || echo "no ./.npmrc"
          echo "NPM_CONFIG_USERCONFIG=$NPM_CONFIG_USERCONFIG"
          echo "=== npm config (effective) ==="
          npm config ls -l 2>&1 | grep -iE "registry|auth|provenance|trust" | head -20

      - name: Publish to NPM
        run: npm publish --access public --provenance --loglevel=verbose
